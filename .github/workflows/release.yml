name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build zip
        run: |
          ZIP="hostpanel-files-${{ steps.version.outputs.VERSION }}.zip"
          zip -r "$ZIP" plugin/ service/ sudoers/ frontend/ \
            --exclude "*/__pycache__/*" --exclude "*.pyc" --exclude "frontend/.gitkeep"
          echo "ZIP=$ZIP" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "hostpanel-files v${{ steps.version.outputs.VERSION }}"
          files: ${{ env.ZIP }}
          generate_release_notes: true
